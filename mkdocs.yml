site_name: EcoNotícias
site_description: Um portal de notícias estático ultra rápido com MkDocs e Decap CMS
site_url: https://seu-site.com

theme:
  name: material
  language: pt-BR
  icon:
    logo: material/earth
  palette:
    # Modo Claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    # Modo Escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: noticias
      post_dir: "{blog}/posts"
      archive: true
      categories: true
      pagination: true
      pagination_per_page: 5

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alexsousa
